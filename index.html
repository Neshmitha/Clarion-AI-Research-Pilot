<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clarion | AI Research Pilot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            color: #1f2937;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 700px;
            padding: 40px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        h2 {
            font-weight: 400;
            color: #6b7280;
            margin-bottom: 30px;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn {
            padding: 12px 24px;
            background-color: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
            transition: 0.3s ease;
        }

        .btn:hover {
            background-color: #1d4ed8;
        }

        footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.9rem;
            color: #9ca3af;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Clarion</h1>
        <h2>AI Research Pilot</h2>

        <p>
            Clarion is an AI-powered research assistant designed to accelerate 
            literature review, structure micro research contributions, 
            and enable transparent collaboration through modular task workflows.
        </p>

        <a href="#" class="btn">Explore the Platform</a>
    </div>

    <footer>
        © 2026 Clarion | Redefining Research Collaboration
    </footer>

</body>
</html>
